<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Vipera Spy</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6">
    <h1 class="text-4xl font-bold text-purple-400 mb-8">📊 Rastreamentos</h1>
    {% for t in tracks %}
    <div class="bg-zinc-900 p-5 rounded-2xl mb-4">
        <p><strong>IP:</strong> {{ t.ip }}</p>
        <p><strong>Local:</strong> {{ t.location }}</p>
        <p><strong>Dispositivo:</strong> {{ t.device }}</p>
        <p><strong>Hora:</strong> {{ t.timestamp }}</p>
    </div>
    {% endfor %}
</body>
</html>
